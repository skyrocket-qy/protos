version: v2
managed:
  enabled: true
  # override:
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen
    opt: paths=source_relative

  - remote: buf.build/bufbuild/es:v2.6.3
    out: gen-ts
    opt: target=ts

  # - remote: buf.build/community/stephenh-ts-proto:v2.6.1
  #   out: gen-ts
  #   opt: paths=source_relative

  - remote: buf.build/grpc/csharp:v1.75.1
    # This sets the base output directory to ./protoscsharp
    out: gen-csharp

  - remote: buf.build/anthropics/connect-rust:v0.6.0
    out: gen_rust_connect
    opt:
      - extern_path=.=crate::gen_rust
  # anthropics/connect-rust depends on anthropics/buffa
  - remote: buf.build/anthropics/buffa:v0.6.0
    out: gen_rust
    opt:
      - json=true


inputs:
  - directory: proto
    exclude_paths:
      - proto/slotpb/arthur.proto
      - proto/slotpb/athena.proto
      - proto/slotpb/desperateraid.proto
      - proto/slotpb/elementalmask.proto
      - proto/slotpb/fishdragon.proto
      - proto/slotpb/frozenqueen.proto
      - proto/slotpb/halloween.proto
      - proto/slotpb/jaguartemple.proto
      - proto/slotpb/lucifer.proto
      - proto/slotpb/mammoth.proto
      - proto/slotpb/pharaohtreasure.proto
      - proto/slotpb/powerwealthgod.proto
      - proto/slotpb/princesssun.proto
      - proto/slotpb/runestorm.proto
      - proto/slotpb/ufo.proto
      - proto/slotpb/westchili.proto