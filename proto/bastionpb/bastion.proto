syntax = "proto3";

package bastionpb;

option go_package = "github.com/skyrocket-qy/protos/gen/bastionpb;bastionpb";

import "slotpb/slot.proto";

enum Action {
  ACTION_UNSPECIFIED = 0;
  PING = 1;
  SPIN = 2;
  BUY_FG = 3;
}

enum GameType {
  GAME_TYPE_UNSPECIFIED = 0;
  SLOT = 1;
  FISH = 2;
}

message WSRequest {
  Action action = 1;
  bytes payload = 2;
  string request_id = 3;
}

message WSResponse {
  bytes payload = 2;
  string request_id = 3;
  optional WSError error = 4;
}

message SpinRequest {
  uint32 game_id = 1;
  uint32 bet_amount = 2;
}

message SpinResp { 
  repeated slotpb.Event events = 1;
}

message BuyFgRequest { uint32 bet_amount = 1; }

message BuyFgResp { repeated slotpb.Event events = 1; }

message WSError {
  string code = 1;
  string message = 2;
}
