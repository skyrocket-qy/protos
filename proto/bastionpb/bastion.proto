syntax = "proto3";

package bastionpb;

option go_package = "github.com/skyrocket-qy/protos/gen/bastionpb;bastionpb";

import "slotpb/slot.proto";

enum Action {
  ACTION_UNSPECIFIED = 0;
  PING = 1;
  SPIN = 2;
  BUY_FG = 3;
}

enum GameType {
  GAME_TYPE_UNSPECIFIED = 0;
  SLOT = 1;
  FISH = 2;
}

message WSRequest {
  Action action = 1;
  bytes payload = 2;
  string request_id = 3;
}

message WSResponse {
  bytes payload = 2;
  string request_id = 3;
  optional WSError error = 4;
}

message SpinRequest {
  uint32 game_id = 1;
  uint32 bet_amount = 2;
}

message SpinResp { 
  repeated slotpb.Event events = 1;
}

message BuyFgRequest { uint32 bet_amount = 1; }

message BuyFgResp { repeated slotpb.Event events = 1; }

message WSError {
  string code = 1;
  string message = 2;
}

message CreateListingRequest {
  string item_name = 1;
  uint64 price = 2;
}

message CreateListingResponse {
  string listing_id = 1;
}

message BuyItemRequest {
  string listing_id = 1;
}

message BuyItemResponse {
  string listing_id = 1;
  uint64 buyer_balance = 2;
}

message AuctionItem {
  string listing_id = 1;
  string seller_id = 2;
  string item_name = 3;
  uint64 price = 4;
  string status = 5;
}

message ListActiveItemsRequest {}

message ListActiveItemsResponse {
  repeated AuctionItem items = 1;
}

service AuctionService {
  rpc CreateListing(CreateListingRequest) returns (CreateListingResponse);
  rpc BuyItem(BuyItemRequest) returns (BuyItemResponse);
  rpc ListActiveItems(ListActiveItemsRequest) returns (ListActiveItemsResponse);
}
