syntax = "proto3";

package walletpb;

option go_package = "github.com/skyrocket-qy/protos/gen/walletpb;walletpb";

enum WalletType {
  WALLET_TYPE_UNSPECIFIED = 0;
  LOCKED = 1;
  UNLOCKED = 2;
}

enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  BET = 1;
  WIN = 2;
  AUCTION_BUY = 3;
  AUCTION_SELL = 4;
  AUCTION_TAX = 5;
}

message GetBalanceRequest {
  string user_id = 1;
}

message GetBalanceResponse {
  uint64 balance = 1;
}

message UpdateBalanceRequest {
  string user_id = 1;
  int64 amount = 2;
  WalletType wallet_type = 3;
  TxType tx_type = 4;
  uint64 ref_id = 5;
}

message UpdateBalanceResponse {
  uint64 balance = 1;
}

message TransferRequest {
  string from_user_id = 1;
  string to_user_id = 2;
  uint64 amount = 3;
  WalletType from_wallet_type = 4;
  WalletType to_wallet_type = 5;
  TxType tx_type = 6;
  uint64 ref_id = 7;
  uint32 receiver_vip_level = 8;
}

message TransferResponse {
  uint64 from_balance_after = 1;
  uint64 to_balance_after = 2;
}

service WalletService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc UpdateBalance(UpdateBalanceRequest) returns (UpdateBalanceResponse);
  rpc Transfer(TransferRequest) returns (TransferResponse);
}