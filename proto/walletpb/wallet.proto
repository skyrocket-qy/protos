syntax = "proto3";

package walletpb;

option go_package = "github.com/skyrocket-qy/protos/gen/walletpb;walletpb";

enum WalletType {
  WALLET_TYPE_UNSPECIFIED = 0;
  LOCKED = 1;
  UNLOCKED = 2;
}

enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  BET = 1;
  WIN = 2;
  AUCTION_BUY = 3;
  AUCTION_SELL = 4;
  AUCTION_TAX = 5;
}

message GetBalanceRequest {
  string user_id = 1;
}

message GetBalanceResponse {
  uint64 balance = 1;
}

message UpdateBalanceRequest {
  string user_id = 1;
  int64 amount = 2;
  WalletType wallet_type = 3;
  TxType tx_type = 4;
  uint64 ref_id = 5;
}

message UpdateBalanceResponse {
  uint64 balance = 1;
}

service WalletService {
  rpc GetBalance(GetBalanceRequest) returns (GetBalanceResponse);
  rpc UpdateBalance(UpdateBalanceRequest) returns (UpdateBalanceResponse);
}