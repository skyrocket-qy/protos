// api.proto
syntax = "proto3";

package gatewaypb;

option go_package = "github.com/skyrocket-qy/protos/gen/gatewaypb;gatewaypb";

service GateWayService {
  rpc GateWay (GateWayRequest) returns (GateWayResponse) {}
}

message GateWayRequest {
  string request_id = 1;
  uint32 ope_code = 2;
  bytes msg = 3;
}

message GateWayResponse {
  string request_id = 1;
  bytes msg = 2;
}
