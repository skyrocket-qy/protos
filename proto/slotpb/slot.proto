// api.proto
syntax = "proto3";

package slotpb;

option go_package = "github.com/skyrocket-qy/protos/gen/slotpb;slotpb";

service SlotService {
  rpc Spin(SpinReq) returns (SpinResp);
  rpc BuyFg(BuyFgReq) returns (BuyFgResp);
}

message Events { repeated Event events = 1; }

message Event {
  uint32 code = 1;
  bytes data = 2;
  uint32 win = 3;
}

message BuyFgReq { uint32 game_id = 1; }

message BuyFgResp {
  Events events = 1;
  uint32 win = 2;
}

message Table { repeated Reel reels = 1; }
message Reel { repeated string symbols = 1; }

message Pos {
  int32 x = 1;
  int32 y = 2;
}

message SpinReq {
  uint32 game_id = 1;
  optional bytes omen = 2;
}

message SpinResp {
  Events events = 1;
  uint32 win = 2;
  optional bytes omen = 3;
}