syntax = "proto3";

package slotpb;

option go_package = "github.com/skyrocket-qy/protos/gen/slotpb;slotpb";

import "slotpb/slot.proto";

message FrozenQueen {
  int32 left_game_cnt = 1;
  Table table = 2;
  optional EventEa event_ea = 3;
  optional int32 left_hold_and_spin_cnt = 4;
  optional bool is_big_win = 5;

  message EventEa { repeated PosVal pos_val = 1; }
}

message FrozenQueenOmen {
  int64 scatter_count = 1;
}

message PosVal {
  Pos pos = 1;
  string symbol = 2;
}

message Mammoth {
  int32 left_game_cnt = 1;
  Table table = 2;                  // spin + 隨機彩金事件
  optional RollBonus event1 = 3;    // 隨機彩金事件
  optional MammonEvent2 event2 = 4; // WILD重轉事件
  optional RollBonus event3 = 5;    // 獎金重轉事件
  optional RollBonus event4 = 6;    // 彩金重轉事件
  optional MammoEmitFIreball emit_fireball = 7;
}

message RollBonus {
  repeated BonusEntry changed_bonuses = 1;
  optional Table table =
      2; // table after apply current event, use for debugging
}

message BonusEntry {
  Pos pos = 1;
  string symbol = 2;
}

message MammonEvent2 {
  bool is_wild =
      1; // if is_wild = false, means trigger the event2 but not roll to wild
  string symbol = 2;
}

// for x_action, if elephant stage is 3(cannot upgrade), do nothing
message MammoEmitFIreball {
  int32 left_cnt = 1;
  int32 left_action = 2; // 1: upgrade, 2: fg+6
  int32 right_cnt = 3;
  int32 right_action = 4; // 1: upgrade, 2: fg+6
}

message PrincessSun {
  int32 left_game_cnt = 1;
  Table table = 2;
  optional PrincessSunLight sun_light = 3;
}
message PrincessSunLight {
  int32 x = 1;
  int32 y = 2;
  int32 dir = 3; // 1: top-down, 2: left-right, 3: all
  int64 score = 4;
  Table table = 5;
}

message WestChili {
  int32 left_game_cnt = 1;
  Table table = 2;
  optional WestChiliCum cum = 3;
  optional Table table2 = 4; // if trigger falling tree
  optional Pos which_ea_to_sfg = 5;
  optional int64 falling_tree_event_score = 6;
  optional int64 now_scatter_count = 7;
}
message WestChiliCum {
  int32 sa = 1;
  int32 sb = 2;
  int32 sc = 3;
  int32 sd = 4;
}

message ElementalMask {
  int32 left_game_cnt = 1;
  Table table = 2;
  repeated ElementalMaskMove moves = 3;
  repeated ElementalMaskMerge merges = 4;
}
message ElementalMaskMove {
  int32 from_x = 1;
  int32 from_y = 2;
  int32 to_x = 3;
  int32 to_y = 4;
}
message ElementalMaskMerge {
  repeated Pos froms = 1;
  Pos to = 2;
  int32 final_rate = 3;
}

message Ufo {
  int32 left_game_cnt = 1;
  Table table = 2;
  optional int64 eb1_score = 3;
  optional int64 eb2_score = 4;
  optional int64 eb3_score = 5;
}

message UfoOmen {}

message MammothOmen {
  int32 left_elephant = 1;
  int32 right_elephant = 2;
}

message JaguarTemple {
  int32 left_game_cnt = 1;
  Table table = 2;
  repeated string collectors = 3;
}

message RuneStorm {
  int32 left_game_cnt = 1;
  Table table = 2;
  int32 right_scatters = 3;
  repeated string left_runes = 4;
  repeated RuneStormAction actions = 5;
  repeated RuneStormRunes rune_on_symbols = 6;
  optional RuneStormFgUpgrade fg_upgrade = 7;
}

message RuneStormAction {
  repeated RuneStormAdd adds = 1;
}

message RuneStormAdd {
  int32 x = 1;
  int32 y = 2;
  int32 val = 3;
}

message RuneStormRunes {
  repeated string runes = 1;
  int32 x = 2;
  int32 y = 3;
}

message RuneStormFgUpgrade {
  repeated string cards = 1;
  repeated string runes = 2;
  repeated RuneStormAction actions = 3;
}

message PowerWealthGod {
  int32 left_game_cnt = 1;
  Table table = 2;
  optional Table table2 = 3; // after processing bingoed xx_E to wild
  int32 ladder = 4;
  optional int32 cum_ss = 5;
  bool is_drop = 6;
}

message Athena {
  int32 left_game_cnt = 1;
  Table table = 2;
}

message PharaohTreasure {
  Table table = 1;
  int32 left_game_cnt = 2;
  repeated string muls = 3;
  int32 mul_sum = 4;
  bool is_drop = 5;
}

message Lucifer {
  Table table = 1;
  int32 left_game_cnt = 2;
}

message Halloween {
  Table table = 1;
  optional Table second_table = 2;
  int32 mini = 3;
  int32 minor = 4;
  int32 major = 5;
  int32 grand = 6;
  int32 left_spin_cnt = 7;
  optional int32 second_left_spin_cnt = 8;
  bool is_extra = 9;
  bool is_double = 10;
  bool is_multi = 11;
}

message Arthur {
  int32 left_game_cnt = 1;
  oneof data {
    ArthurFg fg = 2;
    ArthurBg bg = 3;
    ArthurBg sbg = 4;
  }
}

message ArthurFg {
  Table table1 = 1;
  Table table2 = 2;
}

message ArthurBg {
  Table table = 1;
  int32 left_spin_cnt = 2;
}

message FishDragon {
  int32 left_game_cnt = 1;
  repeated string rolls = 2;
  Table table = 3;
}

message Desperateraid {
  Table original_result = 1;
  Table event_result = 2;
  int32 left_game_cnt = 3;
  repeated DesperateaidMulInfo mul_infos = 4;
}

message DesperateaidMulInfo {
  int32 win = 1;
  int32 up_mul = 2;
  int32 mid_mul = 3;
  int32 dow_mul = 4;
  int32 x = 5;
}
