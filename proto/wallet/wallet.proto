syntax = "proto3";

package wallet;

option go_package = "github.com/skyrocket-qy/protos/gen/wallet;walletpb";

enum WalletType {
  WALLET_TYPE_UNSPECIFIED = 0;
  LOCKED = 1;
  UNLOCKED = 2;
}

enum TxType {
  TX_TYPE_UNSPECIFIED = 0;
  DEPOSIT = 1;
  BET = 2;
  WIN = 3;
  AUCTION_BUY = 4;
  AUCTION_SELL = 5;
  TAX = 6;
  ADMIN_ADJUST = 7;
}